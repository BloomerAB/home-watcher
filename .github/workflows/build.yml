name: build-and-push

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/bloomerab

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.13"
      - run: uv venv
      - run: uv pip install pytest pytest-asyncio numpy pydantic pydantic-settings structlog pyyaml httpx websockets pillow fastapi sqlmodel
      - run: uv pip install -e . --no-deps
      - run: uv run pytest tests/ -v

  build-push:
    name: Build and push
    needs: test
    runs-on: ubuntu-24.04-arm
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Resolve image tag
        id: meta
        run: |
          TAG="$(date -u +%Y%m%d-%H%M%S)-${GITHUB_SHA}"
          echo "tag=${TAG}" >> $GITHUB_OUTPUT

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/home-watcher:${{ steps.meta.outputs.tag }}
          platforms: linux/arm64
          provenance: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build summary
        run: |
          echo "## Image" >> $GITHUB_STEP_SUMMARY
          echo "- Tag: \`${{ steps.meta.outputs.tag }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- Pull: \`docker pull ${{ env.IMAGE_PREFIX }}/home-watcher:${{ steps.meta.outputs.tag }}\`" >> $GITHUB_STEP_SUMMARY
